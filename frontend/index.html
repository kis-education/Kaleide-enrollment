<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="apple-mobile-web-app-title" content="KIS Admissions" />
    <!-- KAL-7: prevent leaking resume_token in Referer header when the wizard
         loads third-party resources (CDN fonts, icons) or when the user clicks
         an external link. no-referrer strips the Referer entirely. -->
    <meta name="referrer" content="no-referrer" />

    <!-- KAL-NEW-8 (audit 2026-05-30): Content-Security-Policy. El wizard guarda el
         resume_token (bearer secret) + PII en sessionStorage; sin CSP, un compromise de
         un CDN externo (jsDelivr, Google Fonts) inyectaría JS arbitrario que podría
         exfiltrarlos. La CSP restringe scripts/estilos/conexiones a una allowlist explícita.

         Directivas:
         - script-src 'unsafe-inline': hay un <script> inline (SPA redirect en <body>) +
           Vite inyecta un polyfill modulepreload inline en el build. El bundle de la app va
           por 'self' (Vite output en GitHub Pages). NO usamos 'unsafe-eval' (la app es
           Vite-bundled, no Babel-runtime; reCAPTCHA v3 funciona sin eval). TODO Stage 2:
           migrar los 2 inline a nonce/hash y eliminar 'unsafe-inline'.
         - style-src 'unsafe-inline': React usa style={{}} (atributos inline) + bootstrap-icons
           + el badge de reCAPTCHA inyecta estilos inline.
         - reCAPTCHA v3 (cargado dinámico en ConsentPage/LandingPage/Step7): script desde
           www.google.com|www.gstatic.com /recaptcha/, iframe badge (frame-src), XHR (connect-src).
         - connect-src: API = GAS web app en script.google.com/macros/.../exec que 302-redirige
           a script.googleusercontent.com → ambos hosts necesarios para que el fetch siga el redirect.
         - frame-ancestors NO se incluye: la spec lo IGNORA cuando la CSP llega vía <meta>
           (solo como header HTTP; GitHub Pages no permite headers). Anti-framing = Stage 2
           (header en proxy/CDN). object-src 'none' + base-uri 'self' + form-action 'self' SÍ aplican en meta. -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.google.com/recaptcha/ https://www.gstatic.com/recaptcha/; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' data: https://fonts.gstatic.com https://cdn.jsdelivr.net; img-src 'self' data: https://raw.githubusercontent.com https://www.gstatic.com; connect-src 'self' https://script.google.com https://script.googleusercontent.com https://www.google.com/recaptcha/; frame-src https://www.google.com/recaptcha/; base-uri 'self'; form-action 'self'; object-src 'none'" />

    <title>Kaleide International School — Admissions</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/kaleideschool/public/main/favicon.png" />
    <!-- Google Fonts CSS es User-Agent-specific (Google sirve CSS distinto por request);
         su hash SRI NO es estable → integrity no aplicable. La CSP style-src
         https://fonts.googleapis.com + font-src https://fonts.gstatic.com restringe el origen. -->
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap"
      rel="stylesheet"
    />
    <!-- Bootstrap-icons @1.11.0 es estable → SRI sha384 fijado (KAL-NEW-8). crossorigin
         anonymous es exigido por SRI (fetch en modo CORS; jsDelivr soporta CORS). -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
      rel="stylesheet"
      integrity="sha384-QuGBSgV5Im3DzL2z+8Ko9/hqNy/N0O7zwvXAtfd1MvPKWa/UbeLV65cfm4BV5Wgq"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <script>
      // GitHub Pages SPA redirect restore — must run before React mounts
      (function () {
        var q = window.location.search;
        if (q && q.indexOf('?p=') === 0) {
          var path = decodeURIComponent(q.slice(3));
          window.history.replaceState(null, null, path);
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
